name: Build elements inventory

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  Build:
    runs-on: hard
    strategy:
      fail-fast: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 30
      - name: Build elements inventory
        run: python3 exordos_core/cmd/elements_inventory.py
