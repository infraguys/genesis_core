# Build section. It specifies the build process of the project
build:

  # Dependencies of the project
  deps:
    # Genesis project
    - dst: /opt/genesis_core
      # Local path
      path:
        src: ../../genesis_core
      exclude:
        - .venv
        - .tox
        - .pytest_cache
        - .ruff_cache
        - build
        - cover
        - output

    # Binary artifacts. Kernel, initrd, boot loaders.
    - dst: /opt/genesis_core/artifacts/undionly.kpxe
      # Local path
      http:
        src: https://repository.genesis-core.tech/seed_os/1.1.0/undionly.kpxe
    - dst: /opt/genesis_core/artifacts/initrd.img
      # Local path
      http:
        src: https://repository.genesis-core.tech/seed_os/1.1.0/initrd.img
    - dst: /opt/genesis_core/artifacts/vmlinuz
      # Local path
      http:
        src: https://repository.genesis-core.tech/seed_os/1.1.0/vmlinuz
    - dst: /opt/genesis_core/artifacts/html.tgz
      # Local path
      http:
        src: https://repository.genesis-core.tech/genesis_ui/0.1.1/html.tgz

    # Take SDK from a local path for development purposes.
    - dst: /opt/gcl_sdk
      optional: true
      path:
        env: LOCAL_GENESIS_SDK_PATH

  # List of elements in the project
  elements:
    # List of images in the element
    - manifest: manifests/core.yaml.j2
      artifacts:
        - path: ../docs/openapi/openapi_user.yaml
      images:
      - name: genesis-core
        format: GEN_IMG_FORMAT_CORE=qcow2

        # OS profile for the image
        profile: genesis_base

        # Provisioning script
        script: images/install.sh

        # Override image build parameters, for instance Packer parameters
        override:
          # For development purposes it's handy to have more space.
          disk_size: "10G"

        envs:
          - ALLOW_USER_PASSWD
          - FREQUENT_LOG_VACUUM
    # eco manifest must be after core manifest!
    - manifest: manifests/ecosystem_realm.yaml.j2
    - manifest: manifests/core-node-set-example.yaml.j2
    - manifest: manifests/core-service-example.yaml.j2
